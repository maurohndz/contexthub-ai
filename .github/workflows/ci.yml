# CI: typecheck + unit tests on every push/PR to the long-lived branches.
# Unit tests use in-memory fakes (no DB/Redis needed), so no services here.
name: CI

on:
  push:
    branches: [main, preprod, qa, develop]
  pull_request:
    branches: [main, preprod, qa, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @contexthub-ai/backend db:generate

      - name: Typecheck backend
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Typecheck frontend
        run: npx tsc --noEmit
        working-directory: apps/frontend

      - name: Backend unit tests
        run: npx vitest run test/unit
        working-directory: apps/backend
